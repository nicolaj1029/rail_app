services:
  - type: web
    name: rail-transport-service
    runtime: node
    rootDir: services/rail-transport-service
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: RAIL_TRANSPORT_DEFAULT_PROVIDER
        value: transport_rest
      - key: RAIL_TRANSPORT_USE_LIVE
        value: "true"
      - key: RAIL_TRANSPORT_AI_FALLBACK_ENABLED
        value: "true"
      - key: RAIL_TRANSPORT_TRANSPORT_REST_BASE
        value: https://v6.db.transport.rest
      - key: RAIL_TRANSPORT_TIMEOUT_MS
        value: "8000"
      - key: RAIL_TRANSPORT_RETRIES
        value: "1"
      - key: RAIL_TRANSPORT_RNE_TIS_ENABLED
        value: "false"
